<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bird Cam</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-icon">&#128247;</span>
      <span class="logo-text">Bird Cam</span>
    </div>
    <div class="header-stats">
      <div class="stat">
        <span class="stat-number" id="speciesCount">0</span>
        <span class="stat-label">species</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-number" id="clipsCount">0</span>
        <span class="stat-label">clips</span>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="bird-grid" id="birdGrid">

      <!-- Video panel lives inside the grid so it pushes rows down.
           JavaScript will move it after whichever card is clicked. -->
      <div class="video-panel" id="videoPanel">
        <div class="video-panel-inner">
          <div class="video-panel-header">
            <div class="video-panel-title-group">
              <span class="video-panel-bird-name" id="panelBirdName"></span>
              <span class="video-panel-clip-count" id="panelClipCount"></span>
            </div>
            <button class="close-panel-btn" id="closePanelBtn" aria-label="Close">&#10005;</button>
          </div>
          <div class="video-grid" id="videoGrid"></div>
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
