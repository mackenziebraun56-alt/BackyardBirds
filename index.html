<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bird Cam</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="logo">
      <span class="logo-icon">&#128247;</span>
      <span class="logo-text">Bird Cam</span>
    </div>
    <div class="header-stats">
      <div class="stat">
        <span class="stat-number" id="speciesCount">0</span>
        <span class="stat-label">Species</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-number" id="clipsCount">0</span>
        <span class="stat-label">Clips</span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="bird-grid" id="birdGrid">

      <!-- Panel: tab strip + full-width video -->
      <div class="video-panel" id="videoPanel">
        <div class="video-panel-box">

          <!-- Tab strip -->
          <div class="tab-strip" id="tabStrip">
            <!-- Tabs injected by JS -->
            <button class="close-panel-btn" id="closePanelBtn" aria-label="Close">&#10005;</button>
          </div>

          <!-- Full-width video area -->
          <div class="video-stage" id="videoStage"></div>

        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
